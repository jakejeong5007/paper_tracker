{% extends 'paper_tracker/base.html' %}

{% block title %}Create Reading List{% endblock %}

{% block content %}
<h2>Create Reading List</h2>

{% if profile %}
    <p class="notice">
        Creating reading list for: <strong>{{ profile.display_name }}</strong>
    </p>
{% endif %}

<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Create Reading List</button>
    </form>
</div>

<p>
    <a href="{% url 'paper_tracker:show_all_papers' %}">Back to all papers</a>
</p>
{% endblock %}
